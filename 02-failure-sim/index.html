<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Failure Simulator — Scale to Millions</title>
  <meta name="description" content="Kill any component in a multi-region architecture and watch which services degrade or go down. Interactive system design visualization.">
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="stylesheet" href="./styles.css">
  <script src="./failure-sim.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>
<body x-data="failureSim">

  <header class="site-header">
    <a class="crumb" href="../">← all visualizations</a>
    <h1>Failure Simulator</h1>
    <span class="subtitle">click a component to kill it · watch what breaks</span>
  </header>

  <main>
    <!-- ────────── canvas ────────── -->
    <section class="canvas">
      <svg viewBox="0 0 1000 650" preserveAspectRatio="xMidYMid meet"
           aria-label="System architecture — kill components by clicking">
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
                  markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="context-stroke"/>
          </marker>
        </defs>

        <!-- ═══ NODES ═══ -->

        <!-- User (always alive) -->
        <g class="node" transform="translate(30, 280)">
          <rect width="100" height="60" rx="6"/>
          <text class="label" x="50" y="26">User</text>
          <text class="sub"   x="50" y="44">browser / app</text>
        </g>

        <!-- CDN -->
        <g class="node" data-killable="true"
           :class="{dead: isDead('cdn')}"
           @click="toggleDead('cdn')"
           transform="translate(30, 80)">
          <rect width="130" height="50" rx="6"/>
          <text class="label" x="65" y="22">CDN</text>
          <text class="sub"   x="65" y="38">edge cache</text>
        </g>

        <!-- Load Balancer -->
        <g class="node" data-killable="true"
           :class="{dead: isDead('lb')}"
           @click="toggleDead('lb')"
           transform="translate(185, 280)">
          <rect width="110" height="60" rx="6"/>
          <text class="label" x="55" y="26">Load Bal.</text>
          <text class="sub"   x="55" y="44">public IP</text>
        </g>

        <!-- Web 1 -->
        <g class="node" data-killable="true"
           :class="{dead: isDead('web-1')}"
           @click="toggleDead('web-1')"
           transform="translate(350, 215)">
          <rect width="140" height="55" rx="6"/>
          <text class="label" x="70" y="24">Web Server 1</text>
          <text class="sub"   x="70" y="42">stateless</text>
        </g>

        <!-- Web 2 -->
        <g class="node" data-killable="true"
           :class="{dead: isDead('web-2')}"
           @click="toggleDead('web-2')"
           transform="translate(350, 305)">
          <rect width="140" height="55" rx="6"/>
          <text class="label" x="70" y="24">Web Server 2</text>
          <text class="sub"   x="70" y="42">stateless</text>
        </g>

        <!-- Cache -->
        <g class="node" data-killable="true"
           :class="{dead: isDead('cache')}"
           @click="toggleDead('cache')"
           transform="translate(610, 130)">
          <rect width="140" height="50" rx="6"/>
          <text class="label" x="70" y="22">Cache</text>
          <text class="sub"   x="70" y="38">Redis / Memcached</text>
        </g>

        <!-- Shards -->
        <g class="node" data-killable="true" :class="{dead: isDead('shard-1')}" @click="toggleDead('shard-1')" transform="translate(610, 200)">
          <rect width="140" height="32" rx="4"/>
          <text class="label" x="70" y="20">Shard 1</text>
        </g>
        <g class="node" data-killable="true" :class="{dead: isDead('shard-2')}" @click="toggleDead('shard-2')" transform="translate(610, 238)">
          <rect width="140" height="32" rx="4"/>
          <text class="label" x="70" y="20">Shard 2</text>
        </g>
        <g class="node" data-killable="true" :class="{dead: isDead('shard-3')}" @click="toggleDead('shard-3')" transform="translate(610, 276)">
          <rect width="140" height="32" rx="4"/>
          <text class="label" x="70" y="20">Shard 3</text>
        </g>
        <g class="node" data-killable="true" :class="{dead: isDead('shard-4')}" @click="toggleDead('shard-4')" transform="translate(610, 314)">
          <rect width="140" height="32" rx="4"/>
          <text class="label" x="70" y="20">Shard 4</text>
        </g>

        <!-- NoSQL -->
        <g class="node" data-killable="true"
           :class="{dead: isDead('nosql')}"
           @click="toggleDead('nosql')"
           transform="translate(770, 248)">
          <rect width="90" height="100" rx="6"/>
          <text class="label" x="45" y="38">NoSQL</text>
          <text class="sub"   x="45" y="60">unstructured</text>
        </g>

        <!-- Session Store -->
        <g class="node" data-killable="true"
           :class="{dead: isDead('session-store')}"
           @click="toggleDead('session-store')"
           transform="translate(350, 410)">
          <rect width="140" height="55" rx="6"/>
          <text class="label" x="70" y="24">Session Store</text>
          <text class="sub"   x="70" y="42">shared state</text>
        </g>

        <!-- Message Queue -->
        <g class="node" data-killable="true"
           :class="{dead: isDead('message-queue')}"
           @click="toggleDead('message-queue')"
           transform="translate(570, 410)">
          <rect width="130" height="55" rx="6"/>
          <text class="label" x="65" y="24">Message Q</text>
          <text class="sub"   x="65" y="42">async buffer</text>
        </g>

        <!-- Worker -->
        <g class="node" data-killable="true"
           :class="{dead: isDead('worker')}"
           @click="toggleDead('worker')"
           transform="translate(740, 410)">
          <rect width="130" height="55" rx="6"/>
          <text class="label" x="65" y="24">Worker</text>
          <text class="sub"   x="65" y="42">async jobs</text>
        </g>

        <!-- Decorative: geoDNS badge + DC2 stub -->
        <g transform="translate(420, 25)">
          <rect class="region-badge" width="160" height="28" rx="14"/>
          <text class="region-text" x="80" y="18">geoDNS routes by region</text>
        </g>
        <g transform="translate(880, 220)">
          <rect class="dc-stub" width="100" height="170" rx="8"/>
          <text class="dc-stub-label" x="50" y="22">DC2</text>
          <text class="dc-stub-sub"   x="50" y="42">us-west</text>
          <text class="dc-stub-sub"   x="50" y="60">(mirrored)</text>
          <rect class="dc-stub-mini" x="20" y="80"  width="60" height="14" rx="2"/>
          <rect class="dc-stub-mini" x="20" y="100" width="60" height="14" rx="2"/>
          <rect class="dc-stub-mini" x="20" y="120" width="60" height="14" rx="2"/>
          <rect class="dc-stub-mini" x="20" y="140" width="60" height="14" rx="2"/>
        </g>

        <!-- Observability strip -->
        <g class="node observability" transform="translate(30, 525)">
          <rect width="840" height="55" rx="6"/>
          <text class="label" x="420" y="24">Logs · Metrics · Automation</text>
          <text class="sub"   x="420" y="42">observes everything above</text>
        </g>

        <!-- ═══ LINKS ═══ -->

        <!-- user → CDN -->
        <line class="link flow" :class="{dead: isDead('cdn')}"
              x1="80" y1="280" x2="80" y2="135" marker-end="url(#arrow)"/>

        <!-- user → LB -->
        <line class="link flow" :class="{dead: isDead('lb')}"
              x1="130" y1="310" x2="180" y2="310" marker-end="url(#arrow)"/>

        <!-- LB → web servers -->
        <line class="link flow" :class="{dead: isDead('lb') || isDead('web-1')}"
              x1="295" y1="298" x2="345" y2="245" marker-end="url(#arrow)"/>
        <line class="link flow" :class="{dead: isDead('lb') || isDead('web-2')}"
              x1="295" y1="322" x2="345" y2="330" marker-end="url(#arrow)"/>

        <!-- web servers → cache -->
        <line class="link flow" :class="{dead: isDead('web-1') || isDead('cache')}"
              x1="490" y1="232" x2="605" y2="158" marker-end="url(#arrow)"/>
        <line class="link flow" :class="{dead: isDead('web-2') || isDead('cache')}"
              x1="490" y1="318" x2="605" y2="172" marker-end="url(#arrow)"/>

        <!-- cache → shard-1 (cache miss path) -->
        <line class="link" :class="{dead: isDead('cache') || isDead('shard-1')}"
              x1="680" y1="180" x2="680" y2="198" marker-end="url(#arrow)"/>

        <!-- web-1 → shard-1 (representative) -->
        <line class="link flow" :class="{dead: isDead('web-1') || isDead('shard-1')}"
              x1="490" y1="242" x2="605" y2="216" marker-end="url(#arrow)"/>
        <!-- web-2 → shard-4 (representative) -->
        <line class="link flow" :class="{dead: isDead('web-2') || isDead('shard-4')}"
              x1="490" y1="332" x2="605" y2="330" marker-end="url(#arrow)"/>

        <!-- web servers → session store -->
        <line class="link" :class="{dead: isDead('web-1') || isDead('session-store')}"
              x1="420" y1="270" x2="420" y2="408" marker-end="url(#arrow)"/>
        <line class="link" :class="{dead: isDead('web-2') || isDead('session-store')}"
              x1="430" y1="360" x2="430" y2="408" marker-end="url(#arrow)"/>

        <!-- web-1 → message queue -->
        <line class="link flow" :class="{dead: isDead('web-1') || isDead('message-queue')}"
              x1="490" y1="265" x2="600" y2="408" marker-end="url(#arrow)"/>
        <!-- queue → worker -->
        <line class="link flow" :class="{dead: isDead('message-queue') || isDead('worker')}"
              x1="700" y1="437" x2="738" y2="437" marker-end="url(#arrow)"/>

        <!-- web-2 → NoSQL (curves under shards) -->
        <path class="link flow" :class="{dead: isDead('web-2') || isDead('nosql')}"
              d="M 490 332 Q 620 400 770 320" marker-end="url(#arrow)"/>

      </svg>
    </section>

    <!-- ────────── side panel ────────── -->
    <aside class="info">

      <div class="summary-banner" :class="summary.state">
        <span class="dot" :class="summary.state"></span>
        <span x-text="summary.label"></span>
      </div>

      <section>
        <h2>Service health</h2>
        <div class="service-list">
          <template x-for="svc in services" :key="svc.id">
            <div class="service-row" :class="svc.state">
              <span class="dot" :class="svc.state"></span>
              <div>
                <div class="label" x-text="svc.label"></div>
                <div class="desc"  x-text="svc.desc"></div>
                <div class="reason" x-text="svc.reason"></div>
              </div>
            </div>
          </template>
        </div>
      </section>

      <section>
        <h2>Try a scenario</h2>
        <div class="scenario-grid">
          <template x-for="s in scenarios" :key="s.id">
            <button class="scenario-btn"
                    :class="{active: activeScenario === s.id}"
                    @click="applyScenario(s.id)"
                    x-text="s.label"></button>
          </template>
          <button class="scenario-btn" @click="resetDead()">Reset</button>
        </div>
        <template x-if="activeScenario">
          <div class="scenario-desc"
               x-text="scenarios.find(x => x.id === activeScenario)?.desc"></div>
        </template>
      </section>

      <section class="dead-list">
        <h2>Failed components</h2>
        <template x-if="!deadIds().length">
          <span class="empty">none — system intact</span>
        </template>
        <template x-if="deadIds().length">
          <ul>
            <template x-for="id in deadIds()" :key="id">
              <li x-text="id"></li>
            </template>
          </ul>
        </template>
      </section>

    </aside>
  </main>

</body>
</html>
